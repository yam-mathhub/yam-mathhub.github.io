    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 60px 40px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
      background-color: #eee;
      color: #fff;
      font-size: 18px;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .filter {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 20px 0 5px;
      margin: 0;
      background-color: #eee;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }

    .fil-l {
      white-space: nowrap;
      overflow: auto;
    }

    .fil-l::-webkit-scrollbar {
      display: none;
    }

    .fil-l {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .fil-r {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
    }

    .filter button {
      color: #000;
      background-color: transparent;
      border: none;
      font-size: 14px;
      padding: 2px 8px 0;
      margin: 0 2px 0;
      cursor: pointer;
    }

    .fil-r button {
      font-size: 16px;
      font-weight: bold;
      width: 16px;
      padding: 2px 10px 2px;
      margin: 2px 4px 0;
      text-align: center;
      color: #444;
    }

    .fil-r button:last-child {
      font-size: 18.5px;
    }

    @media (max-width: 500px) {
      .filter button {
        padding: 2px 4px 0;
        margin: 0 2px 0;
      }

      .fil-r button {
        padding: 2px 10px 2px;
        margin: 2px 4px 0;
      }
    }

    .filter button.active {
      border-bottom: 2px solid #000;
    }

    .fil-r button.active {
      border-bottom: none;
      color: #007bff;
    }

    /* Default: Hide Clock button (Grid mode) */
    #btn-clock {
      display: none;
    }
    /* Default: Show Reverse button */
    #btn-reverse {
      display: block;
    }

    .waterfall {
      position: relative;
      z-index: 10;
      column-count: 5;
      column-gap: 20px;
      margin: 0;
    }

    .waterfall.list-mode {
      column-count: 1;
      column-gap: 0;
      display: block;
    }

    @media (max-width: 1200px) {
      .waterfall {
        column-count: 4;
      }
    }

    @media (max-width: 900px) {
      .waterfall {
        column-count: 3;
      }
    }

    @media (max-width: 600px) {
      .waterfall {
        column-count: 2;
      }

      body {
        padding: 40px 20px;
      }
    }

    @media (max-width: 200px) {
      .waterfall {
        column-count: 1;
      }
    }

    .image-card {
      break-inside: avoid;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      margin: 0 0 20px;
    }

    .image-card img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.3s ease;
    }

    .thumbnail iframe {
      width: 100%;
      aspect-ratio: 16/9;
      border: none;
    }

    .image-info {
      padding: 2px 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-start;
      border-top: 1px solid #f0f0f0;
    }

    .image-card.text .image-info {
      border-top: none;
    }

    .image-title-year {
      display: flex;
      justify-content: space-between;
      width: 100%;
    }

    .image-title {
      font-size: 14px;
      font-weight: 400;
      color: #000;
    }

    .image-year {
      font-size: 12px;
      margin: 3.5px 0 0;
      color: #555;
    }

    .image-category {
      display: none;
      font-size: 12px;
      color: #555;
    }

    .image-description {
      font-size: 12px;
      margin-top: 5px;
      color: #555;
      white-space: pre-wrap;
    }

    .waterfall.list-mode .image-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-bottom: 1px solid #f0f0f0;
    }

    .waterfall.list-mode .thumbnail {
      min-width: 60px;
      height: 60px;
    }

    .waterfall.list-mode .thumbnail img {
      width: 60px;
      height: 60px;
      object-fit: cover;
    }

    .waterfall.list-mode .thumbnail iframe {
      width: 96px;
      height: 54px;
    }

    .waterfall.list-mode .image-info {
      flex: 1;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 20px;
      border-top: none;
    }

    .waterfall.list-mode .image-title-year {
      flex: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 2px;
    }

    .waterfall.list-mode .image-description {
      flex: 3;
      margin-top: 0;
      max-width: 40ch;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .waterfall.list-mode .image-category {
      display: block;
      flex: 1;
    }

    @media (max-width: 600px) {
      .waterfall.list-mode .thumbnail {
        min-width: 40px;
        height: 40px;
      }

      .waterfall.list-mode .thumbnail img {
        width: 40px;
        height: 40px;
      }

      .waterfall.list-mode .thumbnail iframe {
        width: 71px;
        height: 40px;
      }

      .waterfall.list-mode .image-info {
        gap: 10px;
      }

      .waterfall.list-mode .image-title-year {
        flex: 3;
        display: flex;
        gap: 2px;
      }

      .waterfall.list-mode .image-description {
        display: none;
      }

      .waterfall.list-mode .image-category {
        flex: 2;
        order: 3;
      }

      .waterfall.list-mode .image-title {
        font-size: 12px;
      }

      .waterfall.list-mode .image-year {
        font-size: 10px;
      }

      .waterfall.list-mode .image-category {
        font-size: 10px;
      }
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background-color: #eee;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 0;
      margin: 0;
    }

    .modal-content {
      width: 100%;
      height: 100vh;
      margin: 0;
      padding: 0;
      position: relative;
      overflow: hidden;
      animation: zoomIn 0.3s ease;
    }

    @keyframes zoomIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #eee;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      will-change: transform;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .modal-slide img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      pointer-events: none;
    }

    .nav-button {
      position: fixed;
      z-index: 1001;
      top: calc(50%);
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.25);
      color: #000;
      border: none;
      width: 45px;
      height: 45px;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      line-height: 1;
    }

    .nav-button:hover {
      background: rgba(255, 255, 255, 0.6);
      transform: translateY(-50%) scale(1.1);
    }

    .prev-button { left: 20px; }
    .next-button { right: 20px; }

    @media (max-width: 400px) {
      .prev-button { left: 5px; }
      .next-button { right: 5px; }
    }

    @media (max-width: 900px) {
      .nav-button { display: none !important; }
    }

    .close {
      position: fixed;
      top: 20px;
      right: 40px;
      color: #000;
      background: rgba(255, 255, 255, 0.25);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 300;
      cursor: pointer;
      transition: transform 0.3s ease, background 0.3s ease;
      z-index: 1001;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      line-height: 1;
    }

    .close span { padding: 0 0 4px; }
    .close:hover { background: rgba(255, 255, 255, 0.6); }
  </style>
</head>

        description: "這裏有一小塊奇怪的空間，嵌入在走廊牆壁之中，像是一個奇怪的展廳。偶爾遇上展廳，都會停下來，或長或短，誰也説不清。路常常在變，遇上熟悉的事物，總會令人生出一絲安心來，即使那是微乎其微的。<br><br>這裏沒有風，雨水狀的掛飾不會無故地動。抬起手臂輕掃著掛飾，它們發出如風鈴般清脆的聲音。高掛的太陽燈有一圈紅色的光暈，就如真的太陽一樣熾熱……太陽？天空？<br><br>思考沒有答案的問題只會為自己徒增煩惱。<br><br>席地而坐，坐累了，便躺下。聽著通風口低沉的嗡鳴聲，伴隨著掛飾晃動的叮叮聲，很快便入睡了。<br><br>會夢見甚麼呢？",

    let currentCategory = 'All';
    let sortByTime = false;
    let currentImageIndex = -1;
    let currentModalImages = [];
    const waterfall = document.getElementById("waterfall");
    const listBtn = document.getElementById('btn-list');
    const gridBtn = document.getElementById('btn-grid');
    const clockBtn = document.getElementById('btn-clock');
    const reverseBtn = document.getElementById('btn-reverse');
    const modalContent = document.getElementById('modalContent');

    function parseYear(year) {
      if (typeof year !== 'string') return 0;
      if (year.includes('-')) {
        const [y, m] = year.split('-').map(Number);
        return new Date(y, m - 1 || 0).getTime();
      } else {
        return new Date(Number(year), 0).getTime();
      }
    }

    function isValidImage(image) {
      return image.url && image.url.trim() !== '';
    }
    
    function hasValidLink(image) {
       return image.link && image.link.trim() !== '' && image.link !== 'none';
    }

    function updateViewModeButtons(isListMode) {
      if (isListMode) {
        listBtn.style.display = 'none';
        gridBtn.style.display = 'block';
        clockBtn.style.display = 'block'; // Show clock in list mode
      } else {
        gridBtn.style.display = 'none';
        listBtn.style.display = 'block';
        clockBtn.style.display = 'none'; // Hide clock in grid mode
      }
    }

    function refreshWaterfall() {
      let filtered = images.filter(image => currentCategory === 'All' || image.category === currentCategory);
      sortByTime = clockBtn.classList.contains('active');
      if (sortByTime) {
        filtered.sort((a, b) => {
          const da = parseYear(a.year);
          const db = parseYear(b.year);
          return reverseBtn.classList.contains('active') ? da - db : db - da;
        });
      } else if (reverseBtn.classList.contains('active')) {
        filtered.reverse();
      }
      waterfall.innerHTML = '';
      
      // Filter for Modal: Has Image AND NO valid external link (Images are for viewing, Links are for clicking)
      currentModalImages = filtered.filter(image => isValidImage(image) && !hasValidLink(image));
      
      filtered.forEach((image, index) => {
        const card = document.createElement("div");
        card.className = "image-card";
        if (image.category === "Text") {
          card.classList.add("text");
        }
        const thumbnail = document.createElement("div");
        thumbnail.className = "thumbnail";
        let mediaElement;
        if (image.url) {
          mediaElement = document.createElement("img");
          mediaElement.src = image.url;
          mediaElement.alt = image.title;
          mediaElement.loading = "lazy";
          if (image.category === "Music" || image.category === "Website") {
            mediaElement.style.aspectRatio = "1/1";
            mediaElement.style.objectFit = "cover";
          }
          thumbnail.appendChild(mediaElement);
        }
        card.appendChild(thumbnail);
        const info = document.createElement("div");
        info.className = "image-info";
        const titleYear = document.createElement("div");
        titleYear.className = "image-title-year";
        const titleEl = document.createElement("div");
        titleEl.className = "image-title";
        titleEl.textContent = image.title || "Untitled";
        titleYear.appendChild(titleEl);
        const yearEl = document.createElement("div");
        yearEl.className = "image-year";
        yearEl.textContent = image.year;
        titleYear.appendChild(yearEl);
        info.appendChild(titleYear);
        const description = document.createElement("div");
        description.className = "image-description";
        description.innerHTML = image.description || "";
        info.appendChild(description);
        const categoryEl = document.createElement("div");
        categoryEl.className = "image-category";
        categoryEl.textContent = image.category;
        info.appendChild(categoryEl);
        card.appendChild(info);
        
        card.addEventListener("click", () => {
          // Priority: Link > Image Modal
          if (hasValidLink(image)) {
            window.open(image.link, "_blank");
          } else if (isValidImage(image)) {
            const modalIndex = currentModalImages.findIndex(m => m === image);
            openModal(image, modalIndex);
          }
        });
        waterfall.appendChild(card);
      });
    }
    // --- Modal Logic ---
    function preloadImage(url) {
      if (!url) return;
      const img = new Image();
      img.src = url;
    }

    function preloadNeighbors(index) {
      const len = currentModalImages.length;
      if (len === 0) return;
      const prevIndex = (index - 1 + len) % len;
      const nextIndex = (index + 1) % len;
      preloadImage(currentModalImages[prevIndex].url);
      preloadImage(currentModalImages[nextIndex].url);
    }

    function createSlide(imageUrl, position) {
      const slide = document.createElement('div');
      slide.className = 'modal-slide';
      if (position === 'left') slide.style.transform = 'translateX(-100%)';
      else if (position === 'right') slide.style.transform = 'translateX(100%)';
      else slide.style.transform = 'translateX(0)';
      const img = document.createElement('img');
      img.src = imageUrl;
      slide.appendChild(img);
      return slide;
    }

    function openModal(image, modalIndex) {
      const modal = document.getElementById("imageModal");
      modal.style.display = "block";
      document.body.style.overflow = "hidden";
      currentImageIndex = modalIndex;
      modalContent.innerHTML = '';
      const slide = createSlide(image.url, 'center');
      modalContent.appendChild(slide);
      preloadNeighbors(modalIndex);
    }

    function closeModal() {
      const modal = document.getElementById("imageModal");
      modal.style.display = "none";
      document.body.style.overflow = "auto";
      modalContent.innerHTML = '';
    }

    function switchImage(direction) {
      const len = currentModalImages.length;
      if (len <= 1) return;
      const oldSlide = modalContent.querySelector('.modal-slide');
      if (!oldSlide) return;

      const prevIndex = (currentImageIndex - 1 + len) % len;
      const nextIndex = (currentImageIndex + 1) % len;

      let newIndex;
      let entryPosition;
      let exitDirection;

      if (direction === 'next') {
        newIndex = nextIndex;
        entryPosition = 'right';
        exitDirection = 'left';
      } else {
        newIndex = prevIndex;
        entryPosition = 'left';
        exitDirection = 'right';
      }

      currentImageIndex = newIndex;
      const newImage = currentModalImages[newIndex];
      const newSlide = createSlide(newImage.url, entryPosition);
      modalContent.appendChild(newSlide);
      
      newSlide.offsetHeight;

      oldSlide.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
      newSlide.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';

      oldSlide.style.transform = `translateX(${exitDirection === 'left' ? '-100%' : '100%'})`;
      newSlide.style.transform = 'translateX(0)';

      oldSlide.addEventListener('transitionend', () => {
        if (oldSlide.parentNode) oldSlide.parentNode.removeChild(oldSlide);
      }, { once: true });

      preloadNeighbors(newIndex);
    }

    // Event Listeners
    document.addEventListener("DOMContentLoaded", () => {
      handleHashChange();
      window.addEventListener('hashchange', handleHashChange);
      refreshWaterfall();
      const categoryButtons = document.querySelectorAll('.fil-l button');
      categoryButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          categoryButtons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentCategory = btn.textContent;
          updateHash(currentCategory);
          refreshWaterfall();
        });
      });
      listBtn.addEventListener('click', () => {
        waterfall.classList.add('list-mode');
        updateViewModeButtons(true);
      });
      gridBtn.addEventListener('click', () => {
        waterfall.classList.remove('list-mode');
        updateViewModeButtons(false);
      });
      clockBtn.addEventListener('click', () => {
        clockBtn.classList.toggle('active');
        refreshWaterfall();
      });
      reverseBtn.addEventListener('click', () => {
        reverseBtn.classList.toggle('active');
        refreshWaterfall();
      });
      document.querySelector(".close").addEventListener("click", closeModal);
      document.querySelector(".prev-button").addEventListener("click", () => switchImage('prev'));
      document.querySelector(".next-button").addEventListener("click", () => switchImage('next'));
      const modal = document.getElementById("imageModal");
      modal.addEventListener("click", (e) => {
        if (e.target === e.currentTarget || e.target.classList.contains('modal-container') || e.target.classList.contains('modal-content')) {
          closeModal();
        }
      });

      // Touch Swipe Logic
      let touchStartX = 0;
      let touchStartY = 0;
      let isDragging = false;
      let currentSlide = null;
      let siblingSlide = null;
      let dragDirection = null;

      modal.addEventListener('touchstart', e => {
        if (currentModalImages.length <= 1) return;
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
        isDragging = true;
        currentSlide = modalContent.querySelector('.modal-slide');
        dragDirection = null;
        siblingSlide = null;
        if(currentSlide) currentSlide.style.transition = 'none';
      }, { passive: true });

      modal.addEventListener('touchmove', e => {
        if (!isDragging || !currentSlide) return;
        const touchX = e.changedTouches[0].screenX;
        const touchY = e.changedTouches[0].screenY;
        const diffX = touchX - touchStartX;
        const diffY = touchY - touchStartY;

        if (!dragDirection) {
          if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 10) {
             dragDirection = diffX > 0 ? 'prev' : 'next'; 
           } else if (Math.abs(diffY) > Math.abs(diffX)) {
             isDragging = false; 
             return;
           }
        }

        currentSlide.style.transform = `translateX(${diffX}px)`;
        const len = currentModalImages.length;
        let siblingIndex;
        
        if (diffX < 0 && dragDirection === 'next') {
          if (!siblingSlide) {
            siblingIndex = (currentImageIndex + 1) % len;
            siblingSlide = createSlide(currentModalImages[siblingIndex].url, 'right');
            modalContent.appendChild(siblingSlide);
          }
          siblingSlide.style.transition = 'none';
          siblingSlide.style.transform = `translateX(calc(100% + ${diffX}px))`;
          
        } else if (diffX > 0 && dragDirection === 'prev') {
          if (!siblingSlide) {
            siblingIndex = (currentImageIndex - 1 + len) % len;
            siblingSlide = createSlide(currentModalImages[siblingIndex].url, 'left');
            modalContent.appendChild(siblingSlide);
          }
          siblingSlide.style.transition = 'none';
          siblingSlide.style.transform = `translateX(calc(-100% + ${diffX}px))`;
        }

      }, { passive: true });

      modal.addEventListener('touchend', e => {
        if (!isDragging || !currentSlide) return;
        isDragging = false;
        const touchX = e.changedTouches[0].screenX;
        const diffX = touchX - touchStartX;
        const threshold = 80; 

        currentSlide.style.transition = 'transform 0.3s ease';
        if (siblingSlide) siblingSlide.style.transition = 'transform 0.3s ease';

        if (Math.abs(diffX) > threshold && dragDirection) {
          if (diffX < 0) {
            currentSlide.style.transform = 'translateX(-100%)';
            if (siblingSlide) siblingSlide.style.transform = 'translateX(0)';
            currentImageIndex = (currentImageIndex + 1) % currentModalImages.length;
          } else {
            currentSlide.style.transform = 'translateX(100%)';
            if (siblingSlide) siblingSlide.style.transform = 'translateX(0)';
            currentImageIndex = (currentImageIndex - 1 + currentModalImages.length) % currentModalImages.length;
          }
          
          currentSlide.addEventListener('transitionend', () => {
            if (currentSlide.parentNode) currentSlide.parentNode.removeChild(currentSlide);
          }, { once: true });

        } else {
          currentSlide.style.transform = 'translateX(0)';
          if (siblingSlide) {
             if (dragDirection === 'next') siblingSlide.style.transform = 'translateX(100%)';
             else siblingSlide.style.transform = 'translateX(-100%)';
             
             siblingSlide.addEventListener('transitionend', () => {
               if (siblingSlide && siblingSlide.parentNode) siblingSlide.parentNode.removeChild(siblingSlide);
             }, { once: true });
          }
        }
        preloadNeighbors(currentImageIndex);
      }, { passive: true });

      document.addEventListener("keydown", (e) => {
        if (document.getElementById('imageModal').style.display === 'block') {
          if (e.key === "Escape") closeModal();
          else if (e.key === "ArrowLeft") switchImage('prev');
          else if (e.key === "ArrowRight") switchImage('next');
        }
      });
    });

    // URL Hash Logic
    function handleHashChange() {
      let hash = window.location.hash.substring(1);
      let targetCategory = "All";
      const categoryMap = {
        "all": "All",
        "text": "Text",
        "drawing-painter": "Drawing & Painter",
        "collage": "Collage",
        "music": "Music",
        "website": "Website",
        "3d-modeling": "3D Modeling",
        "other": "Other"
      };
      if (categoryMap[hash]) targetCategory = categoryMap[hash];
      const buttons = document.querySelectorAll('.fil-l button');
      buttons.forEach(btn => {
        if (btn.textContent === targetCategory && !btn.classList.contains('active')) btn.click();
      });
    }

    function updateHash(category) {
      const hashMap = {
        "All": "all",
        "Text": "text",
        "Drawing & Painter": "drawing-painter",
        "Collage": "collage",
        "Music": "music",
        "Website": "website",
        "3D Modeling": "3d-modeling",
        "Other": "other"
      };
      if (hashMap[category]) window.location.hash = hashMap[category];
    }
  </script>
